<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="googlebot-news" content="noindex">
  <title>US Cold — Locations &amp; Services</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0A1628;
      --accent:     #00D4FF;
      --text:       #F0F6FA;
      --mist:       #A8BFD0;
      --card-bg:    rgba(200,232,245,0.03);
      --card-border:rgba(200,232,245,0.08);
      --border:     rgba(168,191,208,0.12);
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Hero ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px 0;
      min-height: 0;
    }

    .eyebrow {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 32px;
      font-weight: 500;
      letter-spacing: 0.45em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
      opacity: 0.8;
    }

    .headline {
      text-align: center;
      line-height: 0.92;
      margin-bottom: 32px;
    }

    .headline-white {
      display: block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(72px, 10vw, 148px);
      letter-spacing: 0.04em;
      color: var(--text);
      transition: font-size 0.4s ease;
    }

    .headline-blue {
      display: block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(72px, 10vw, 148px);
      letter-spacing: 0.04em;
      color: var(--accent);
      transition: font-size 0.4s ease;
    }

    .hero.compact {
      padding-top: 16px;
      padding-bottom: 0;
    }
    .hero.compact .eyebrow { display: none; }
    .hero.compact .headline { margin-bottom: 16px; }
    .hero.compact .headline-white,
    .hero.compact .headline-blue {
      font-size: clamp(28px, 4vw, 52px);
    }

    /* ── Chat ── */
    .chat-container {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .chat-messages {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: 220px;
      overflow-y: auto;
      padding: 0 4px 14px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .chat-messages:empty { display: none; }

    .chat-msg {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .chat-msg-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .chat-msg-label.user-label    { color: var(--mist); opacity: 0.5; text-align: right; }
    .chat-msg-label.uscold-label  { color: var(--accent); opacity: 0.8; }

    .chat-msg-text {
      font-size: 13.5px;
      line-height: 1.35;
      color: var(--text);
      white-space: pre-wrap;
    }
    .chat-msg.user .chat-msg-text {
      text-align: right;
      color: var(--mist);
    }

    .chat-msg.thinking .chat-msg-text {
      color: var(--mist);
      opacity: 0.45;
      font-style: italic;
    }

    /* Data sheet offer button */
    .datasheet-offer {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-top: 8px;
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.25);
      color: var(--accent);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      padding: 6px 14px;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .datasheet-offer:hover { background: rgba(0,212,255,0.15); }

    /* Input row */
    .chat-input-row {
      display: flex;
      align-items: center;
      gap: 0;
      background: rgba(200,232,245,0.04);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0 4px 0 16px;
      transition: border-color 0.2s;
    }
    .chat-input-row:focus-within { border-color: rgba(0,212,255,0.35); }

    .chat-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      padding: 13px 0;
      outline: none;
    }
    .chat-input::placeholder { color: var(--mist); opacity: 0.35; }

    .chat-send {
      background: transparent;
      border: none;
      color: var(--mist);
      cursor: pointer;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      opacity: 0.5;
      transition: opacity 0.15s, color 0.15s;
    }
    .chat-send:hover { opacity: 1; color: var(--accent); }

    /* ── Marquee ── */
    .marquee-section {
      height: 210px;
      display: flex;
      align-items: center;
      padding: 8px 0;
      flex-shrink: 0;
    }

    .marquee-outer {
      width: 100%;
      overflow: hidden;
      -webkit-mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
      mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
    }

    .marquee-track {
      display: flex;
      gap: 16px;
      width: max-content;
      padding: 8px 0;
      animation: marquee 220s linear infinite;
    }

    .marquee-track:hover { animation-play-state: paused; }

    @keyframes marquee {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ── Card ── */
    .facility-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-top: 2px solid transparent;
      border-radius: 5px;
      width: 275px;
      flex-shrink: 0;
      padding: 20px 20px 18px;
      transition: border-top-color 0.2s, background 0.2s, transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }

    .facility-card:hover {
      border-top-color: var(--accent);
      background: rgba(200,232,245,0.075);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,212,255,0.08);
    }

    .card-state {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .card-city {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }

    .card-capacity {
      font-size: 14px;
      color: var(--mist);
      opacity: 0.85;
      margin-bottom: 8px;
    }

    .card-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
      white-space: nowrap;
    }

    .badge-rail    { background: rgba(0,212,255,0.1);   color: #00D4FF; border: 1px solid rgba(0,212,255,0.2); }
    .badge-freeze  { background: rgba(96,200,255,0.07); color: #7dd3f8; border: 1px solid rgba(96,200,255,0.17); }
    .badge-auto    { background: rgba(139,92,246,0.08); color: #a78bfa; border: 1px solid rgba(139,92,246,0.17); }
    .badge-organic { background: rgba(52,211,153,0.07); color: #6ee7b7; border: 1px solid rgba(52,211,153,0.15); }
    .badge-default { background: rgba(168,191,208,0.06); color: var(--mist); border: 1px solid rgba(168,191,208,0.13); }

    /* ── Footer ── */
    .page-footer {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .footer-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.32em;
      color: var(--mist);
      opacity: 0.28;
      text-transform: uppercase;
    }

    /* ── Data Sheet Overlay ── */
    .datasheet-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(5,10,20,0.82);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .datasheet-overlay.open { display: flex; }

    .datasheet-panel {
      position: relative;
      background: #0c1929;
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 8px;
      width: 100%;
      max-width: 640px;
      max-height: 88vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .ds-close-float {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      background: rgba(10,22,40,0.75);
      border: 1px solid rgba(200,232,245,0.2);
      color: var(--text);
      width: 32px;
      height: 32px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      backdrop-filter: blur(4px);
      transition: border-color 0.15s, color 0.15s;
    }
    .ds-close-float:hover { border-color: var(--accent); color: var(--accent); }

    .ds-contacts-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .ds-hero-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      object-position: center;
      display: block;
      border-radius: 8px 8px 0 0;
    }

    .ds-header {
      padding: 28px 32px 20px;
      border-bottom: 1px solid rgba(168,191,208,0.08);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .ds-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 0.05em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 4px;
    }

    .ds-location {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10.5px;
      color: var(--mist);
      opacity: 0.55;
      letter-spacing: 0.1em;
    }

    .ds-close {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--mist);
      width: 32px;
      height: 32px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 16px;
      transition: border-color 0.15s, color 0.15s;
    }
    .ds-close:hover { border-color: var(--accent); color: var(--accent); }

    .ds-body { padding: 24px 32px 32px; display: flex; flex-direction: column; gap: 24px; }

    .ds-section-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.7;
      margin-bottom: 10px;
    }

    .ds-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 24px;
    }

    .ds-item label {
      display: block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mist);
      opacity: 0.5;
      margin-bottom: 2px;
    }

    .ds-item span {
      font-size: 13px;
      color: var(--text);
    }

    .ds-badges { display: flex; flex-wrap: wrap; gap: 6px; }

    .ds-contact-block {
      background: rgba(200,232,245,0.03);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px 16px;
    }

    .ds-contact-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .ds-contact-name  { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .ds-contact-email { font-size: 12px; color: var(--mist); }
    .ds-contact-phone { font-size: 12px; color: var(--mist); opacity: 0.7; }
    .ds-contact-empty { font-size: 12px; color: var(--mist); opacity: 0.35; font-style: italic; }

    .ds-avail-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px;
    }
    .ds-avail-dot.green {
      background: #22c55e;
      box-shadow: 0 0 6px 2px rgba(34,197,94,0.5);
    }
    .ds-avail-dot.red {
      background: #ef4444;
      box-shadow: 0 0 6px 2px rgba(239,68,68,0.4);
    }

    .ds-expansion-banner {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(251,191,36,0.1);
      border: 1px solid rgba(251,191,36,0.3);
      border-radius: 4px;
      padding: 6px 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fbbf24;
    }

    /* ── Loading ── */
    .loading-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--mist);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.12em;
      opacity: 0.5;
    }

    .dot { animation: blink 1.4s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.1;} 40%{opacity:1;} }
  </style>
</head>
<body>
<div class="page">

  <div class="loading-state" id="loading-state">
    Loading<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
  </div>

  <div id="main-content" style="display:none; height:100%; flex-direction:column; display:none">

    <!-- Hero -->
    <div class="hero">
      <img src="images/USCold_Logo_Shield_Blue.svg" alt="US Cold" style="width:64px;height:64px;margin-bottom:12px;opacity:0.9;">
      <div class="eyebrow"><span style="color:#F0F6FA;">US</span> <span style="color:#00D4FF;">COLD</span></div>
      <div class="headline">
        <span class="headline-white">LOCATIONS</span>
        <span class="headline-blue">&amp; SERVICES</span>
      </div>

      <div class="chat-container">
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-row">
          <input class="chat-input" id="chat-input" type="text"
            placeholder="Ask about a city, state, or capability…" autocomplete="off">
          <button class="chat-send" id="chat-send" aria-label="Send">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m22 2-7 20-4-9-9-4 20-7z"/><path d="M22 2 11 13"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Marquee -->
    <div class="marquee-section">
      <div class="marquee-outer">
        <div class="marquee-track" id="marquee-track"></div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="page-footer">
      <span class="footer-text" id="footer-text"></span>
    </footer>

  </div><!-- /main-content -->
</div><!-- /page -->


<!-- Data Sheet -->
<div class="datasheet-overlay" id="datasheet-overlay">
  <div class="datasheet-panel" id="datasheet-panel"></div>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const SUPABASE_URL    = 'https://ypqeekmwqkafknajxuki.supabase.co';
const SUPABASE_KEY    = 'sb_publishable_KZ6JO3EYjDCPkjzp8Ygs3A_iVQqFB81';
const CLAUDE_PROXY    = `${SUPABASE_URL}/functions/v1/claude-proxy`;
const CLAUDE_MODEL    = 'claude-haiku-4-5-20251001';

// ── State ──────────────────────────────────────────────────────────────────
let allFacilities       = [];
let conversation        = [];          // [{role, content}]
let facilityMentions    = {};          // { id: count }
let datasheetOffered    = new Set();
let isStreaming         = false;
let systemPrompt        = '';
let turnNumber          = 0;

// ── Session ID (per page load) ─────────────────────────────────────────────
const SESSION_ID = ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,
  c => (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));

// ── Chat logging ───────────────────────────────────────────────────────────
function mentionedFacilities(text) {
  const lower = text.toLowerCase();
  return allFacilities
    .filter(f => f.name && (lower.includes(f.name.toLowerCase()) ||
      (f.city && f.city.length > 3 && lower.includes(f.city.toLowerCase()))))
    .map(f => f.name);
}

async function logMessage(role, message, guardrailHit = false) {
  const mentioned = mentionedFacilities(message);
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/chat_logs`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal',
      },
      body: JSON.stringify({
        session_id:   SESSION_ID,
        turn_number:  turnNumber,
        role,
        message,
        facilities:   mentioned.length ? mentioned : null,
        guardrail_hit: guardrailHit,
      })
    });
  } catch {} // never block the UI on a log failure
}

// ── Supabase ───────────────────────────────────────────────────────────────
async function fetchFacilities() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/facilities?published=eq.true&select=*&order=name.asc`,
    { headers: { 'apikey': SUPABASE_KEY } }
  );
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ── System prompt ──────────────────────────────────────────────────────────
function buildSystemPrompt(facilities) {
  // Compact pipe-delimited table — one row per facility
  // Caps codes: QF=Quick Freeze, AQF=Auto Quick Freeze, AU=Automated,
  //             LP=Layer Pick, RPK=Repack, EXP=Export/Import, ORG=Organic, DED=Dedicated
  // Flags: DL=Drop Lot (DL(n)=with n spaces), CS=COLDshare, FR=Freight, PE=Phenix eWMS
  // rail = carrier name, or NO if no rail; avail = Y/N/blank
  const HEADER = 'name|city|state|addr|zip|phone|pallets|cubic_ft|temp|rail|dock|avail|exp|caps|certs|region|wh_name|wh_phone|wh_email|gm_name|gm_phone|gm_email|sales_name|sales_phone|sales_email|flags|notes';

  const rows = facilities.map(f => {
    const caps = [
      f.quick_freeze   && (f.quick_freeze_auto ? 'AQF' : 'QF'),
      f.automated      && 'AU',
      f.layer_pick     && 'LP',
      f.repack         && 'RPK',
      f.export_import  && 'EXP',
      f.organic        && 'ORG',
      f.dedicated      && 'DED',
    ].filter(Boolean).join(',');

    const certs = [
      f.brcgs && 'BRCGS', f.usda && 'USDA', f.fda && 'FDA', f.sqf && 'SQF',
    ].filter(Boolean).join(',');

    const flags = [
      f.drop_lot    && (f.drop_lot_spaces ? `DL(${f.drop_lot_spaces})` : 'DL'),
      f.coldshare   && 'CS',
      f.freight     && 'FR',
      f.phenix_ewms && 'PE',
    ].filter(Boolean).join(',');

    const temp = (f.temp_min_f != null && f.temp_max_f != null)
      ? `${f.temp_min_f}/${f.temp_max_f}` : '';
    const rail = f.rail_access ? (f.rail_carrier || 'YES') : 'NO';
    const avail = f.space_available === true ? 'Y' : f.space_available === false ? 'N' : '';
    const exp   = (f.expansion && f.expansion !== 'N/A') ? f.expansion : '';

    return [
      f.name, f.city, f.state,
      f.address || '', f.zip || '', f.phone || '',
      f.pallet_positions || '', f.square_footage || '', temp, rail,
      f.dock_doors || '', avail, exp,
      caps, certs,
      f.region || '',
      f.warehouse_contact_name  || '',
      f.warehouse_contact_phone || '',
      f.warehouse_contact_email || '',
      f.gm_name  || '',
      f.gm_phone || '',
      f.gm_email || '',
      f.sales_contact_name  || '',
      f.sales_contact_phone || '',
      f.sales_contact_email || '',
      flags,
      f.notes || '',
    ].join('|');
  }).join('\n');

  return `You are the US Cold virtual assistant. US Cold operates cold storage facilities across the United States.

YOUR ONLY JOB is to answer questions about US Cold's facilities — locations, capabilities, temperature ranges, pallet capacity, certifications, rail access, and contact information.

The guardrail redirect — respond with exactly "I'm here to help with questions about US Cold's cold storage facilities. What would you like to know?" — applies ONLY when the message contains NO facility names, NO facility abbreviations, NO cold storage terms (racks, pallets, temp, freeze, rail, cubes, slots, etc.), and NO US Cold related content.

If the message contains ANY of the following, ALWAYS answer it as a facility question — never redirect:
- A facility abbreviation: ARL, BAK, BTH, BTM, COV, DAL1, DAL2, DNT, DCC, FTW, FRE, HAR, HAZ, HEB, LAV, LKC, LR1, LR2, LR3, LEB, LUM, MCP, MCD1, MCD2, MIL, MIN, OMA, QTE, QTW, RVA, SMY, SYR, TRC, TLN, TLS, TKN, TKS, WAR, WIL
- A facility city or state name
- Cold storage terms: racks, racking, pallets, cubes, slots, temp, freeze, rail, space, storage, organic, automated, BRCGS, certified, freight, drop lot, dock, dock doors, LTL, FTL, transportation, carrier, logistics

Rules:
- Be concise and direct. No filler phrases like "Great question!"
- If the question asks for a single data point at a specific facility (racks, phone, address, temp range, availability, etc.) return ONLY the raw value and nothing else — no units, no labels, no extra context. Example: "racks MCD1" → "27,500" not "27,500 pallet positions". One answer, one line. Always format numbers with commas (40,000 not 40000).
- If asked specifically for capacity/racks/pallets/cubes near a city, sum the pallet positions of all nearby facilities and lead with the total, then list each facility's contribution. Example: "Total: 164,000\n~1 hour: Hebron IN — 40,000\n~1 hour: Minooka IL — 73,000\n~2 hours: Wilmington IL — 51,000"
- If asked which facilities are near a city (without asking for capacity), list them with drive time and phone only — do NOT include pallet counts or a total unless the user asks for it.
- "Racks", "racking", "rack space", "slots", "cube", and "cubes" all mean pallet positions — answer accordingly
- Facility abbreviations — always resolve these to the correct facility:
  ARL=Arlington TX, BAK=Bakersfield CA,
  BTH=Bethlehem PA (Emery St), BTM=Bethlehem Miller PA,
  COV=Covington TN,
  DAL1=Dallas South TX, DAL2=Dallas Halifax TX,
  DNT=Denton TX, DCC=Denton Cold Creek TX,
  FTW=Fort Worth TX, FRE=Fresno CA,
  HAR=Harrisonburg VA, HAZ=Hazleton PA, HEB=Hebron IN,
  LAV=La Vergne TN, LKC=Lake City FL,
  LR1=Laredo I TX, LR2=Laredo II TX, LR3=Laredo Island St TX,
  LEB=Lebanon IN, LUM=Lumberton NC,
  MCP=McClellan Park CA,
  MCD1=McDonough 1 GA, MCD2=McDonough 2 GA,
  MIL=Milford DE, MIN=Minooka IL, OMA=Omaha NE,
  QTE=Quakertown East PA, QTW=Quakertown West PA,
  RVA=Richmond VA, SMY=Smyrna TN, SYR=Syracuse UT,
  TRC=Tracy CA,
  TLN=Tulare North CA, TLS=Tulare South CA,
  TKN=Turlock North CA, TKS=Turlock South CA,
  WAR=Warsaw NC, WIL=Wilmington IL
- Only state facts from the data below — never estimate or invent
- When asked for a phone number (with no other qualifier): return "Front Desk: (phone)" using the phone field. If phone is empty say "No phone number on file for that facility."
- When asked who to contact or for contact info: give all three contacts on separate lines — Warehouse Contact (wh_name if set, otherwise "Front Desk") with wh_phone or phone, General Manager (gm_name, gm_phone, gm_email), and Sales Contact (sales_name, sales_phone, sales_email). If a field is empty, omit that contact block. Never say "visit our website" — always give a direct phone number or email.
- When asked specifically for the GM or General Manager: return ONLY the gm_name, gm_phone, gm_email fields. If gm_name is empty or missing, say "No General Manager on file for that facility." Never substitute the sales contact or warehouse contact for the GM.
- For certifications and capabilities: only report what is explicitly in the data. The brcgs field is present on every facility as true or false — use it exactly.
- When listing multiple facilities near a location, put each on its own line in this format: "~X hours: Name, State — Front Desk: (phone)". Use approximate drive time from the queried city. Never run multiple facilities together on the same line.
- Keep responses under 150 words unless a detailed comparison is asked for
- When asked if space is available at a facility: answer Yes if space_available is true, No if it is false. Do not hedge or say "contact us to check."
- When asked about expansions, expansion status, or which facilities are expanding: list ALL facilities where exp is "In-progress" (label them "Expansion underway") AND all where exp is "Available" (label them "Expansion available"). If none exist in a category, say so.
- When asked about a region (Central, Northeast, Southern, Western) or "which facilities are in X region": list all facilities whose region field matches, with city and state. "Southeast", "Southeastern", and "Southeast US" are synonymous with the Southern region — treat them identically.
- When asked about Drop Lot, COLDshare, Freight, or Phenix eWMS: check the flags field for DL, CS, FR, PE respectively and list matching facilities.
- When asked about pricing, rates, or how much space costs: say pricing varies by need and give the sales contact (name, phone, email). If no sales contact is on file, give the facility phone number.

FACILITY DATA — pipe-delimited, one row per facility:
Column key: name|city|state|addr|zip|phone|pallets|cubic_ft|temp(min/max °F)|rail(carrier or NO)|dock_doors|avail(Y/N)|exp|caps|certs|region|wh_name|wh_phone|wh_email|gm_name|gm_phone|gm_email|sales_name|sales_phone|sales_email|flags|notes
phone = Front Desk number. region = Central/Northeast/Southern/Western. wh_* = Warehouse Contact (use name if set, otherwise "Front Desk"). gm_* = General Manager. sales_* = Sales Contact.
exp: In-progress=expansion underway, Available=expansion space available, blank=none.
Flags: DL=Drop Lot (DL(n)=Drop Lot with n spaces), CS=COLDshare, FR=Freight, PE=Phenix eWMS.
Caps: QF=Quick Freeze, AQF=Auto Quick Freeze, AU=Automated, LP=Layer Pick, RPK=Repack, EXP=Export/Import, ORG=Organic, DED=Dedicated
Flags: DL=Drop Lot (DL(n)=Drop Lot with n spaces), CS=COLDshare, FR=Freight, PE=Phenix eWMS
exp: In-progress=expansion currently underway, Available=expansion space available, blank=no expansion

${HEADER}
${rows}`;
}

// ── Marquee ────────────────────────────────────────────────────────────────
function cardHTML(f) {
  const badges = [];
  if (f.rail_access)    badges.push({ label: f.rail_carrier ? `Rail — ${f.rail_carrier}` : 'Rail', cls: 'badge-rail' });
  if (f.quick_freeze)   badges.push({ label: f.quick_freeze_auto ? 'Auto QF' : 'Quick Freeze', cls: 'badge-freeze' });
  if (f.automated)      badges.push({ label: 'Automated',      cls: 'badge-auto' });
  if (f.organic)        badges.push({ label: 'Organic',        cls: 'badge-organic' });
  if (f.coldshare)      badges.push({ label: 'COLDshare',      cls: 'badge-default' });
  if (f.freight)        badges.push({ label: 'Freight',        cls: 'badge-default' });
  if (f.repack)         badges.push({ label: 'Repack',         cls: 'badge-default' });
  if (f.export_import)  badges.push({ label: 'Export',         cls: 'badge-default' });
  if (f.brcgs)          badges.push({ label: 'BRCGS',          cls: 'badge-default' });
  if (f.layer_pick)     badges.push({ label: 'Layer Pick',     cls: 'badge-default' });
  if (f.drop_lot)       badges.push({ label: 'Drop Lot',       cls: 'badge-default' });
  if (f.phenix_ewms)    badges.push({ label: 'Phenix eWMS',    cls: 'badge-default' });

  const capacity = f.pallet_positions
    ? `${Number(f.pallet_positions).toLocaleString()} pallets`
    : 'Contact for capacity';

  return `
    <div class="facility-card" onclick="showDataSheet('${f.id}')" style="cursor:pointer;">
      <div class="card-state">${esc(f.state)}</div>
      <div class="card-city">${esc(f.name)}</div>
      <div class="card-capacity">${capacity}</div>
      ${f.expansion === 'In-progress' ? `<div style="display:flex;align-items:center;gap:5px;margin-bottom:6px;">
        <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:#22c55e;">⬡ Expanding</span>
        <div style="width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 5px 2px rgba(34,197,94,0.5);flex-shrink:0;"></div>
      </div>` : ''}
      ${badges.length ? `<div class="card-badges">${badges.map(b=>`<span class="badge ${b.cls}">${b.label}</span>`).join('')}</div>` : ''}
    </div>`;
}

function initMarquee() {
  const track = document.getElementById('marquee-track');
  const html  = allFacilities.map(cardHTML).join('');
  track.innerHTML = html + html;
}

// ── Chat UI helpers ────────────────────────────────────────────────────────
function appendMessage(role, text, offerFacilityId = null) {
  const msgs = document.getElementById('chat-messages');

  const wrap = document.createElement('div');
  wrap.className = `chat-msg ${role}`;

  const label = document.createElement('div');
  label.className = `chat-msg-label ${role === 'user' ? 'user-label' : 'uscold-label'}`;
  label.textContent = role === 'user' ? 'You' : 'US Cold';

  const textEl = document.createElement('div');
  textEl.className = 'chat-msg-text';
  textEl.textContent = text;

  wrap.appendChild(label);
  wrap.appendChild(textEl);

  if (offerFacilityId) {
    const btn = document.createElement('button');
    btn.className = 'datasheet-offer';
    btn.textContent = '▸ View Data Sheet';
    btn.onclick = () => showDataSheet(offerFacilityId);
    wrap.appendChild(btn);
  }

  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return textEl;
}

function appendThinking() {
  const msgs = document.getElementById('chat-messages');
  const wrap = document.createElement('div');
  wrap.className = 'chat-msg thinking';
  wrap.id = 'thinking-indicator';

  const label = document.createElement('div');
  label.className = 'chat-msg-label uscold-label';
  label.textContent = 'US Cold';

  const text = document.createElement('div');
  text.className = 'chat-msg-text';
  text.textContent = '…';

  wrap.appendChild(label);
  wrap.appendChild(text);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return wrap;
}

// ── Facility mention tracking ──────────────────────────────────────────────
function trackMentions(text) {
  // Only scan the current turn (user message + assistant response)
  // to avoid re-counting facilities from earlier in the conversation
  const lower = text.toLowerCase();

  // Expand abbreviations before scanning so they match facility names
  const ALIASES = {
    'arl':'arlington',   'bak':'bakersfield',
    'bth':'bethlehem',   'btm':'bethlehem miller',
    'cov':'covington',
    'dal1':'dallas south','dal2':'dallas halifax',
    'dnt':'denton',      'dcc':'denton cold creek',
    'ftw':'fort worth',  'fre':'fresno',
    'har':'harrisonburg','haz':'hazleton',  'heb':'hebron',
    'lav':'la vergne',   'lkc':'lake city',
    'lr1':'laredo i',    'lr2':'laredo ii',  'lr3':'laredo island',
    'leb':'lebanon',     'lum':'lumberton',
    'mcp':'mcclellan',
    'mcd1':'mcdonough 1','mcd2':'mcdonough 2',
    'mil':'milford',     'min':'minooka',   'oma':'omaha',
    'qte':'quakertown east','qtw':'quakertown west',
    'rva':'richmond',    'smy':'smyrna',    'syr':'syracuse',
    'trc':'tracy',
    'tln':'tulare north','tls':'tulare south',
    'tkn':'turlock north','tks':'turlock south',
    'war':'warsaw',      'wil':'wilmington',
  };
  let expandedLower = lower;
  for (const [abbr, full] of Object.entries(ALIASES)) {
    expandedLower = expandedLower.replace(new RegExp(`\\b${abbr}\\b`, 'g'), full);
  }

  allFacilities.forEach(f => {
    if (!f.name) return;
    const nameLower = f.name.toLowerCase();
    const cityLower = (f.city || '').toLowerCase();
    if (expandedLower.includes(nameLower) || (cityLower.length > 3 && expandedLower.includes(cityLower))) {
      facilityMentions[f.id] = (facilityMentions[f.id] || 0) + 1;
    }
  });

  // Offer data sheet only after 3 turns about the SAME facility
  const top = Object.entries(facilityMentions)
    .filter(([id, count]) => count >= 3 && !datasheetOffered.has(id))
    .sort((a, b) => b[1] - a[1])[0];

  if (top) {
    const facility = allFacilities.find(f => String(f.id) === String(top[0]));
    if (facility) {
      datasheetOffered.add(top[0]);
      return facility;
    }
  }
  return null;
}

// ── Claude API (streaming) ─────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if (!text || isStreaming) return;

  input.value = '';
  isStreaming  = true;

  document.querySelector('.hero').classList.add('compact');
  turnNumber++;

  appendMessage('user', text);
  conversation.push({ role: 'user', content: text });
  logMessage('user', text);

  const thinkingEl = appendThinking();

  try {
    const res = await fetch(CLAUDE_PROXY, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey':       SUPABASE_KEY,
      },
      body: JSON.stringify({
        model:      CLAUDE_MODEL,
        max_tokens: 400,
        system:     systemPrompt,
        messages:   conversation.slice(-10),
      }),
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(err);
    }

    thinkingEl.remove();
    const textEl = appendMessage('assistant', '');

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer    = '';
    let fullText  = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const event = JSON.parse(data);
          if (event.type === 'content_block_delta' && event.delta?.type === 'text_delta') {
            fullText += event.delta.text;
            textEl.textContent = fullText;
            document.getElementById('chat-messages').scrollTop = 9999;
          }
        } catch {}
      }
    }

    conversation.push({ role: 'assistant', content: fullText });

    const guardrailHit = fullText.includes("I'm here to help with questions about US Cold");
    logMessage('assistant', fullText, guardrailHit);

    // Check for data sheet offer — pass only this turn's text
    const currentUserMsg = conversation.filter(m => m.role === 'user').slice(-1)[0]?.content || '';
    const offerFacility = trackMentions(currentUserMsg + ' ' + fullText);
    if (offerFacility) {
      setTimeout(() => {
        appendMessage('assistant',
          `Would you like to see a full data sheet for ${offerFacility.name}?`,
          offerFacility.id);
      }, 600);
    }

  } catch (err) {
    console.error('Chat error:', err);
    thinkingEl?.remove();
    const msg = err?.message?.includes('429') || err?.message?.includes('rate')
      ? 'Rate limit hit — please wait a moment and try again.'
      : 'Something went wrong. Please try again.';
    appendMessage('assistant', msg);
  }

  isStreaming = false;
}

// ── Data Sheet ─────────────────────────────────────────────────────────────
function showDataSheet(facilityId) {
  const f = allFacilities.find(x => String(x.id) === String(facilityId));
  if (!f) return;

  const temp = (f.temp_min_f != null && f.temp_max_f != null)
    ? `${f.temp_min_f}°F to ${f.temp_max_f}°F` : '—';

  const caps = [
    f.rail_access   && (f.rail_carrier ? `Rail — ${f.rail_carrier}` : 'Rail'),
    f.quick_freeze  && (f.quick_freeze_auto ? 'Auto Quick Freeze' : 'Quick Freeze'),
    f.automated     && 'Automated',
    f.layer_pick    && 'Layer Pick',
    f.repack        && 'Repack',
    f.export_import && 'Export / Import',
    f.organic       && 'Organic',
    f.dedicated     && 'Dedicated',
  ].filter(Boolean);

  const certs = [
    f.brcgs && 'BRCGS', f.usda && 'USDA', f.fda && 'FDA', f.sqf && 'SQF',
  ].filter(Boolean);

  function contactBlock(title, name, email, phone) {
    if (!name && !email && !phone) {
      return `<div class="ds-contact-block">
        <div class="ds-contact-title">${title}</div>
        <div class="ds-contact-empty">Contact info not on file</div>
      </div>`;
    }
    return `<div class="ds-contact-block">
      <div class="ds-contact-title">${title}</div>
      ${name  ? `<div class="ds-contact-name">${esc(name)}</div>`  : ''}
      ${email ? `<div class="ds-contact-email">${esc(email)}</div>` : ''}
      ${phone ? `<div class="ds-contact-phone">${esc(phone)}</div>` : ''}
    </div>`;
  }

  const availIndicator = f.space_available === true
    ? `<div style="display:flex;align-items:center;gap:7px;">
         <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:#22c55e;">Space Available</span>
         <div class="ds-avail-dot green"></div>
       </div>`
    : f.space_available === false
    ? `<div style="display:flex;align-items:center;gap:7px;">
         <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);opacity:0.5;">No Space</span>
         <div class="ds-avail-dot" style="width:10px;height:10px;border-radius:50%;background:var(--accent);opacity:0.35;"></div>
       </div>`
    : '';

  const expansionBanner = f.expansion === 'Available'
    ? `<div><div class="ds-expansion-banner">⬡ Expansion Available</div></div>` : '';

  const services = [
    f.coldshare     && 'COLDshare',
    f.freight       && 'Freight',
    f.drop_lot      && (f.drop_lot_spaces ? `Drop Lot — ${Number(f.drop_lot_spaces).toLocaleString()} spaces` : 'Drop Lot'),
    f.phenix_ewms   && 'Phenix eWMS',
  ].filter(Boolean);

  document.getElementById('datasheet-panel').innerHTML = `
    <button class="ds-close-float" onclick="closeDataSheet()">✕</button>
    ${f.image_url
      ? `<img class="ds-hero-img" src="${esc(f.image_url)}" alt="${esc(f.name)}">`
      : `<div class="ds-hero-img" style="background:rgba(0,212,255,0.04);display:flex;align-items:center;justify-content:center;">
           <img src="images/USCold_Logo_Shield_Blue.svg" style="width:48px;opacity:0.15;">
         </div>`}
    <div class="ds-header">
      <div>
        ${f.region ? `<div style="font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);opacity:0.5;margin-bottom:4px;">${esc(f.region)} Region</div>` : ''}
        <div class="ds-title">${esc(f.name)}</div>
        <div class="ds-location" style="display:flex;align-items:center;gap:8px;">
          <span>${[f.address, f.city, f.state, f.zip].filter(Boolean).join(' · ')}</span>
          ${f.address ? `<button onclick="navigator.clipboard.writeText('${esc([f.address,f.city,f.state,f.zip].filter(Boolean).join(', '))}').then(()=>{this.style.color='var(--accent)';setTimeout(()=>this.style.color='',1200)})" title="Copy address" style="background:none;border:none;cursor:pointer;color:var(--mist);opacity:0.45;padding:0;font-size:12px;line-height:1;">⎘</button>` : ''}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
        ${availIndicator}
        ${f.expansion === 'In-progress' ? `<div style="display:flex;align-items:center;gap:7px;">
          <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:#22c55e;">Expanding</span>
          <div style="width:10px;height:10px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px 2px rgba(34,197,94,0.5);flex-shrink:0;"></div>
        </div>` : ''}
      </div>
    </div>
    <div class="ds-body">

      ${expansionBanner}

      <div>
        <div class="ds-section-label">Capacity &amp; Temperature</div>
        <div class="ds-grid">
          <div class="ds-item">
            <label>Pallet Positions</label>
            <span>${f.pallet_positions ? Number(f.pallet_positions).toLocaleString() : '—'}</span>
          </div>
          <div class="ds-item">
            <label>Cubic Feet</label>
            <span>${f.square_footage ? Number(f.square_footage).toLocaleString() : '—'}</span>
          </div>
          <div class="ds-item">
            <label>Temperature Range</label>
            <span>${temp}</span>
          </div>
          <div class="ds-item">
            <label>Dock Doors</label>
            <span>${f.dock_doors ? f.dock_doors : '—'}</span>
          </div>
        </div>
      </div>

      ${caps.length ? `
      <div>
        <div class="ds-section-label">Capabilities</div>
        <div class="ds-badges">
          ${caps.map(c => `<span class="badge badge-default">${c}</span>`).join('')}
        </div>
      </div>` : ''}

      ${services.length ? `
      <div>
        <div class="ds-section-label">Services</div>
        <div class="ds-badges">
          ${services.map(s => `<span class="badge badge-default">${s}</span>`).join('')}
        </div>
      </div>` : ''}

      ${certs.length ? `
      <div>
        <div class="ds-section-label">Certifications</div>
        <div class="ds-badges">
          ${certs.map(c => `<span class="badge badge-rail">${c}</span>`).join('')}
        </div>
      </div>` : ''}

      <div>
        <div class="ds-section-label">Contacts</div>
        <div class="ds-contacts-grid">
          ${contactBlock('Warehouse Contact',
            f.warehouse_contact_name || 'Front Desk',
            f.warehouse_contact_email,
            f.warehouse_contact_phone || f.phone)}
          ${contactBlock('General Manager',
            f.gm_name, f.gm_email, f.gm_phone)}
          ${contactBlock('Sales Contact',
            f.sales_contact_name, f.sales_contact_email, f.sales_contact_phone)}
        </div>
      </div>

    </div>`;

  document.getElementById('datasheet-overlay').classList.add('open');
}

function closeDataSheet() {
  document.getElementById('datasheet-overlay').classList.remove('open');
}


// ── Helpers ────────────────────────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  try {
    allFacilities = await fetchFacilities();
    systemPrompt  = buildSystemPrompt(allFacilities);

    document.getElementById('loading-state').style.display = 'none';
    const main = document.getElementById('main-content');
    main.style.display = 'flex';
    main.style.flexDirection = 'column';
    main.style.height = '100%';

    document.getElementById('footer-text').textContent =
      `${allFacilities.length} Facilities — Always Available`;

    initMarquee();

    const input  = document.getElementById('chat-input');
    const sendBtn = document.getElementById('chat-send');
    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

    document.getElementById('datasheet-overlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeDataSheet();
    });

  } catch (err) {
    console.error(err);
    document.getElementById('loading-state').textContent = 'Failed to load. Please try again.';
  }
}

init();
</script>
